# ============================================
# PROD Profile
# Uses default AWS credential chain (env vars, IRSA, instance role)
# ============================================
spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}

  h2:
    console:
      enabled: false

  r2dbc:
    password: ${DB_PASSWORD}

logging:
  level:
    io.awspring.cloud: WARN
    com.ecommerce: INFO
