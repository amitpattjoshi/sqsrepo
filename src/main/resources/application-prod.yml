# ============================================
# PROD Profile
# Uses real AWS SQS with IAM/profile credentials
# ============================================
spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
      credentials:
        profile:
          name: ${AWS_PROFILE:sqs}

  h2:
    console:
      enabled: false

  r2dbc:
    password: ${DB_PASSWORD}

logging:
  level:
    io.awspring.cloud: WARN
    com.ecommerce: INFO
