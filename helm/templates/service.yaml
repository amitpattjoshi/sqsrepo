apiVersion: v1
kind: Service
metadata:
  name: { { include "ecommerce-sqs.fullname" . } }
  labels:
    app: { { include "ecommerce-sqs.name" . } }
spec:
  type: { { .Values.service.type } }
  ports:
    - port: { { .Values.service.port } }
      targetPort: 8082
      nodePort: { { .Values.service.nodePort } }
  selector:
    app: { { include "ecommerce-sqs.name" . } }
