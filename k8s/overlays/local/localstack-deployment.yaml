apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  labels:
    app: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:latest
          ports:
            - containerPort: 4566
          env:
            - name: SERVICES
              value: "sqs"
            - name: DEFAULT_REGION
              value: "eu-west-1"
          volumeMounts:
            - name: init-scripts
              mountPath: /etc/localstack/init/ready.d
          readinessProbe:
            exec:
              command: ["awslocal", "sqs", "list-queues"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-scripts
          configMap:
            name: localstack-init
            defaultMode: 0755
