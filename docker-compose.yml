# ============================================
# docker-compose.yml
# Usage:
#   Local dev:  docker-compose --profile local up --build
#   Production: docker-compose --profile prod up --build
# ============================================

services:
  # ---- LocalStack (local SQS emulator) ----
  localstack:
    image: localstack/localstack:latest
    profiles: ["local"]
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=eu-west-1
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "awslocal", "sqs", "list-queues"]
      interval: 5s
      timeout: 10s
      retries: 5

  # ---- App with LocalStack (local dev) ----
  ecommerce-sqs-local:
    build: .
    profiles: ["local"]
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_CLOUD_AWS_SQS_ENDPOINT=http://localstack:4566
      - SPRING_CLOUD_AWS_ENDPOINT=http://localstack:4566
      - DB_PASSWORD=changeme
    depends_on:
      localstack:
        condition: service_healthy

  # ---- App with real AWS SQS (production) ----
  ecommerce-sqs-prod:
    build: .
    profiles: ["prod"]
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AWS_REGION=eu-west-1
      - AWS_PROFILE=sqs
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ~/.aws:/root/.aws:ro
